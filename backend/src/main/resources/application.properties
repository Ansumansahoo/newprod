# ChainMed Spring Boot Application Properties

# ============ SERVER ============
server.port=8080
spring.application.name=chainmed-backend

# ============ POSTGRESQL DATABASE (Open Source) ============
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:chainmeddb}
spring.datasource.username=${DB_USER:chainmed}
spring.datasource.password=${DB_PASSWORD:chainmed123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ============ JPA / HIBERNATE ============
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============ FLYWAY MIGRATIONS ============
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============ ETHEREUM BLOCKCHAIN ============
blockchain.rpc.url=${BLOCKCHAIN_RPC_URL:http://localhost:8545}
blockchain.contract.address=${CONTRACT_ADDRESS:0x5FbDB2315678afecb367f032d93F642f64180aa3}
blockchain.private.key=${BLOCKCHAIN_PRIVATE_KEY:0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
blockchain.gas.price=20000000000
blockchain.gas.limit=300000

# ============ CORS ============
cors.allowed-origins=http://localhost:3000,https://newprod-chainmed.vercel.app

# ============ JWT ============
jwt.secret=${JWT_SECRET:chainmed-super-secret-key-blockchain-2024}
jwt.expiration=86400000

# ============ LOGGING ============
logging.level.com.chainmed=DEBUG
logging.level.org.web3j=WARN
logging.level.org.springframework.security=WARN
